services:
  database:
    image: postgres:15-alpine
    container_name: database
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_password_2024
      POSTGRES_DB: multi_tenant_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d multi_tenant_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: multi_tenant_saas
      DATABASE_USER: saas_user
      DATABASE_PASSWORD: saas_password_2024
      JWT_SECRET: super_secret_jwt_key_change_in_production_2024
      JWT_EXPIRES_IN: 24h
      # Frontend origin for CORS
      FRONTEND_URL: http://frontend:3000
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - saas-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:5000
    container_name: frontend
    environment:
      REACT_APP_API_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - saas-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  saas-network:
    driver: bridge
